<style>
:root {
  --bg: #080b0f;
  --bg2: #0d1117;
  --bg3: #111820;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --green: #00e5a0;
  --green-dim: rgba(0,229,160,0.12);
  --red: #ff4c6a;
  --red-dim: rgba(255,76,106,0.1);
  --amber: #ffb84d;
  --amber-dim: rgba(255,184,77,0.1);
  --blue: #5b9cf6;
  --blue-dim: rgba(91,156,246,0.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.1);
  --text: #e2e8f0;
  --text2: #8892a4;
  --text3: #4a5568;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.7;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(0,229,160,.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(91,156,246,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,11,15,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 clamp(20px,5vw,60px);display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-size:12px;color:var(--green);letter-spacing:.08em;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-logo::before{content:'>';color:var(--text3);animation:blink 1.2s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:12px;letter-spacing:.06em;transition:color .2s}
.nav-links a:hover{color:var(--green)}

/* NAV RIGHT CONTROLS (Lang + Counter) */
.nav-right { display: flex; align-items: center; gap: 20px; }
.visitor-counter { font-size: 10px; color: var(--text3); letter-spacing: .1em; display: flex; align-items: center; gap: 6px; }
.visitor-counter span { color: var(--green); }

/* LANG */
.lang-switcher{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px}
.lang-btn{background:transparent;border:none;color:var(--text2);font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:4px 9px;border-radius:4px;cursor:pointer;transition:all .2s}
.lang-btn:hover{color:var(--text)}
.lang-btn.active{background:var(--green);color:#080b0f;font-weight:500}

/* LAYOUT */
main{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 clamp(20px,5vw,48px)}

/* HERO */
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-top:80px}
.hero-eyebrow{font-size:11px;color:var(--green);letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--green)}
.hero-name{font-family:var(--serif);font-size:clamp(48px,9vw,96px);font-weight:300;line-height:.95;letter-spacing:-.02em;margin-bottom:24px;color:var(--text)}
.hero-name span{color:var(--green);font-style:italic}
